<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung One UI Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Samsung One UI Header -->
    <header class="samsung-header">
        <div class="header-top">
            <div class="time-display">12:30</div>
            <div class="status-icons">
                <span class="wifi">✦</span>
                <span class="battery">🔋</span>
            </div>
        </div>
        <div class="search-bar">
            <div class="search-input">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Search apps, content...">
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Quick Settings Panel -->
        <section class="quick-settings">
            <div class="settings-grid">
                <div class="setting-item">
                    <div class="setting-icon">🌙</div>
                    <div class="setting-label">Dark Mode</div>
                </div>
                <div class="setting-item">
                    <div class="setting-icon">📶</div>
                    <div class="setting-label">Mobile Data</div>
                </div>
                <div class="setting-item">
                    <div class="setting-icon">🔄</div>
                    <div class="setting-label">Bluetooth</div>
                </div>
                <div class="setting-item">
                    <div class="setting-icon">💻</div>
                    <div class="setting-label">WiFi</div>
                </div>
            </div>
        </section>

        <!-- App Grid -->
        <section class="app-grid">
            <h2 class="category-title">Communication</h2>
            <div class="apps-container">
                <div class="app-item">
                    <div class="app-icon">📱</div>
                    <div class="app-name">Phone</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">💬</div>
                    <div class="app-name">Messages</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">👤</div>
                    <div class="app-name">Contacts</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">💖</div>
                    <div class="app-name">Gmail</div>
                </div>
            </div>

            <h2 class="category-title">Productivity</h2>
            <div class="apps-container">
                <div class="app-item">
                    <div class="app-icon">📝</div>
                    <div class="app-name">Notes</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">📄</div>
                    <div class="app-name">Calendar</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">💬</div>
                    <div class="app-name">Clock</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">📊</div>
                    <div class="app-name">Calculator</div>
                </div>
            </div>

            <h2 class="category-title">Entertainment</h2>
            <div class="apps-container">
                <div class="app-item">
                    <div class="app-icon">🎬</div>
                    <div class="app-name">YouTube</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">🎵</div>
                    <div class="app-name">Spotify</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">🎮</div>
                    <div class="app-name">Games</div>
                </div>
                <div class="app-item">
                    <div class="app-icon">📷</div>
                    <div class="app-name">Camera</div>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <div class="nav-icon">📱</div>
                <div class="nav-label">Apps</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">📱</div>
                <div class="nav-label">Widgets</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">📱</div>
                <div class="nav-label">Gallery</div>
            </div>
        </nav>
    </main>

    <script src="script.js"></script>
</body>
</html>
